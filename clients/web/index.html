<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Streamhaul Web Viewer (P5-2)</title>
    <style>
      /* Functional-only styling; visual polish is deferred (ADR-0022). */
      body { font-family: system-ui, sans-serif; margin: 1rem; background: #111; color: #ddd; }
      #screen { background: #000; border: 1px solid #444; image-rendering: pixelated; max-width: 100%; }
      .status { display: grid; grid-template-columns: max-content 1fr; gap: 0.25rem 1rem; margin: 0.5rem 0; }
      .status dt { color: #888; }
      .status dd { margin: 0; font-family: monospace; }
      button { margin-right: 0.5rem; }
      #error { color: #f66; font-family: monospace; min-height: 1.2em; }
      /* File-transfer (P7-2) — functional-only styling. */
      #file-transfer { margin-top: 1rem; max-width: 32rem; }
      .file-drop { border: 2px dashed #555; border-radius: 6px; padding: 1.25rem; text-align: center;
        color: #aaa; cursor: pointer; user-select: none; }
      .file-drop.dragover { border-color: #6cf; background: #022; color: #cef; }
      .file-status { margin: 0.4rem 0; font-family: monospace; min-height: 1.2em; }
      .file-progress { background: #222; border: 1px solid #444; border-radius: 4px; overflow: hidden; height: 1.2em; }
      .file-progress-bar { background: #285; width: 0%; height: 100%; text-align: center; color: #fff;
        font-family: monospace; font-size: 0.8em; line-height: 1.2em; transition: width 0.1s linear; }
      .file-integrity { margin-top: 0.4rem; font-family: monospace; color: #888; }
      .file-integrity[data-state="ok"] { color: #6e6; }
      .file-integrity[data-state="failed"] { color: #f66; }
    </style>
  </head>
  <body>
    <h1>Streamhaul Web Viewer</h1>
    <div>
      <button id="connect">Connect</button>
      <button id="disconnect">Disconnect</button>
    </div>
    <dl class="status">
      <dt>Connection</dt><dd id="phase">idle</dd>
      <dt>ICE</dt><dd id="ice">new</dd>
      <dt>Negotiated codec</dt><dd id="codec">—</dd>
      <dt>WebCodecs</dt><dd id="webcodecs">—</dd>
      <dt>Local DTLS fingerprint</dt><dd id="fingerprint">—</dd>
    </dl>
    <div id="error"></div>
    <canvas id="screen" width="320" height="240" tabindex="0"></canvas>
    <section id="file-transfer" aria-label="File transfer"></section>
    <script type="module" src="/src/app.ts"></script>
  </body>
</html>
