name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ----------------------------------------------------------------------------
  # Enforce Conventional Commits on the PR title (powers squash-merge commit msg)
  # ----------------------------------------------------------------------------
  pr-title:
    name: pr-title
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - name: Validate PR title (Conventional Commits)
        env:
          TITLE: ${{ github.event.pull_request.title }}
        run: |
          echo "PR title: $TITLE"
          if ! echo "$TITLE" | grep -Eq '^(feat|fix|docs|style|refactor|perf|test|build|ci|chore|revert)(\([a-z0-9._-]+\))?!?: .+'; then
            echo "::error::PR title must follow Conventional Commits, e.g. 'feat(transport): add QUIC datagram path'"
            exit 1
          fi

  # ----------------------------------------------------------------------------
  # Lint: rustfmt + clippy (deny warnings). No-ops cleanly until Rust code lands.
  # ----------------------------------------------------------------------------
  lint:
    name: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Detect Rust project
        id: rust
        run: |
          if [ -f Cargo.toml ]; then echo "present=true" >> "$GITHUB_OUTPUT"; else echo "present=false" >> "$GITHUB_OUTPUT"; fi
      - name: Add rustfmt + clippy
        if: steps.rust.outputs.present == 'true'
        run: rustup component add rustfmt clippy
      - name: cargo fmt --check
        if: steps.rust.outputs.present == 'true'
        run: cargo fmt --all -- --check
      - name: cargo clippy -D warnings
        if: steps.rust.outputs.present == 'true'
        run: cargo clippy --all-targets --all-features -- -D warnings
      - name: No Rust code yet
        if: steps.rust.outputs.present == 'false'
        run: echo "No Cargo.toml yet — lint gate is a no-op until Rust code lands."

  # ----------------------------------------------------------------------------
  # Test: full suite across Linux, Windows, macOS.
  # ----------------------------------------------------------------------------
  test:
    name: test
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4
      - name: Detect Rust project
        id: rust
        shell: bash
        run: |
          if [ -f Cargo.toml ]; then echo "present=true" >> "$GITHUB_OUTPUT"; else echo "present=false" >> "$GITHUB_OUTPUT"; fi
      - name: Build & test
        if: steps.rust.outputs.present == 'true'
        run: cargo test --workspace --all-features --verbose
      - name: No Rust code yet
        if: steps.rust.outputs.present == 'false'
        shell: bash
        run: echo "No Cargo.toml yet — test gate is a no-op until Rust code lands."

  # ----------------------------------------------------------------------------
  # WASM bridges: build + test (Node runner, no browser required).
  # Guards both sh-wasm (wire-codec parity) and sh-crypto-wasm (browser crypto
  # bridge: identity, R-SIG-AUTH, Noise XK/IK + DTLS binding) from rotting on
  # every PR/push.  Linux-only: wasm-pack + Node suffice for verification without
  # a browser.  Browser-matrix testing (Chrome/FF/Safari) is deferred — see
  # R-BROWSER-INTEROP / R-BROWSER-MATRIX / R-BROWSER-CRYPTO-LIVE (ADR-0019/0020).
  # ----------------------------------------------------------------------------
  wasm:
    name: wasm
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Add wasm32-unknown-unknown target
        run: rustup target add wasm32-unknown-unknown
      - name: Install wasm-pack (pinned, checksum-verified binary)
        uses: taiki-e/install-action@v2
        with:
          tool: wasm-pack@0.13.1

      # --- sh-wasm: wire-codec parity bridge ---
      - name: clippy sh-wasm (wasm target, panic-ban)
        run: cargo clippy --manifest-path crates/sh-wasm/Cargo.toml --target wasm32-unknown-unknown --all-targets -- -D warnings
      - name: wasm-pack test --node sh-wasm (wire-parity suite)
        run: wasm-pack test --node crates/sh-wasm
      - name: wasm-pack build --target web sh-wasm (artifact smoke-check)
        run: wasm-pack build --target web crates/sh-wasm

      # --- sh-crypto-wasm: browser crypto bridge (P5, ADR-0020) ---
      - name: clippy sh-crypto-wasm (wasm target, panic-ban)
        run: cargo clippy --manifest-path crates/sh-crypto-wasm/Cargo.toml --target wasm32-unknown-unknown --all-targets -- -D warnings
      - name: wasm-pack test --node sh-crypto-wasm (identity + R-SIG-AUTH + Noise XK/IK suite)
        run: wasm-pack test --node crates/sh-crypto-wasm
      - name: wasm-pack build --target web sh-crypto-wasm (artifact smoke-check)
        run: wasm-pack build --target web crates/sh-crypto-wasm

  # ----------------------------------------------------------------------------
  # Browser WebRTC client: live RTCPeerConnection e2e in headless Firefox.
  # `sh-web-client` (P5-1c, ADR-0021) enforces the DTLS-fingerprint identity pin
  # (P4-5 / ADR-0014) in the browser.  Node has no RTCPeerConnection, so this job
  # uses headless Firefox + geckodriver.  The non-vacuous MITM-rejection e2e proves
  # a signaling/SDP fingerprint swap is rejected before setRemoteDescription.
  # Chrome/Safari matrix is deferred — R-BROWSER-MATRIX.
  # ----------------------------------------------------------------------------
  browser-webrtc-client:
    name: browser-webrtc-client
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Add wasm32-unknown-unknown target
        run: rustup target add wasm32-unknown-unknown
      - name: Install wasm-pack (pinned, checksum-verified binary)
        uses: taiki-e/install-action@v2
        with:
          tool: wasm-pack@0.13.1
      - name: Install Firefox (headless e2e)
        uses: browser-actions/setup-firefox@v1
        with:
          # Pinned to the exact proven build (ADR-0021: Firefox 152.0.1 + geckodriver 0.37.0).
          # `browser-actions/setup-firefox` needs a full version string (a bare "152" 404s);
          # `latest` could auto-advance into a geckodriver-incompatible Firefox.
          firefox-version: "152.0.1"
      - name: Install geckodriver (pinned GitHub release)
        run: |
          set -euo pipefail
          # Pinned to 0.37.0 to match ADR-0021 (the proven local toolchain: Firefox 152 + geckodriver 0.37).
          GECKO_VERSION=v0.37.0
          GECKO_SHA256=90d4e33bd9816684400c160d1309aaffec23a3f65103511d5a62d8501062e548
          URL="https://github.com/mozilla/geckodriver/releases/download/${GECKO_VERSION}/geckodriver-${GECKO_VERSION}-linux64.tar.gz"
          curl -fsSL "$URL" -o /tmp/geckodriver.tar.gz
          echo "${GECKO_SHA256}  /tmp/geckodriver.tar.gz" | sha256sum -c -
          tar -xzf /tmp/geckodriver.tar.gz -C /usr/local/bin
          chmod +x /usr/local/bin/geckodriver
          geckodriver --version

      - name: clippy sh-web-client (wasm target, panic-ban)
        run: cargo clippy --manifest-path crates/sh-web-client/Cargo.toml --target wasm32-unknown-unknown --all-targets -- -D warnings
      - name: wasm-pack test --headless --firefox sh-web-client (SDP-parser + WebRTC DTLS-pin e2e)
        env:
          # ICE loopback + DTLS convergence can be slower on a loaded CI runner than locally.
          WASM_BINDGEN_TEST_TIMEOUT: "60"
        run: wasm-pack test --headless --firefox crates/sh-web-client
      - name: wasm-pack build --target web sh-web-client (artifact smoke-check)
        run: wasm-pack build --target web crates/sh-web-client

  # ----------------------------------------------------------------------------
  # Security audit of dependencies.
  # ----------------------------------------------------------------------------
  audit:
    name: audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Detect Rust project
        id: rust
        run: |
          if [ -f Cargo.toml ]; then echo "present=true" >> "$GITHUB_OUTPUT"; else echo "present=false" >> "$GITHUB_OUTPUT"; fi
      - name: Install cargo-audit (prebuilt)
        if: steps.rust.outputs.present == 'true'
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-audit
      - name: cargo audit
        if: steps.rust.outputs.present == 'true'
        run: cargo audit --deny warnings
      - name: No Rust code yet
        if: steps.rust.outputs.present == 'false'
        run: echo "No Cargo.toml yet — audit gate is a no-op until Rust code lands."
