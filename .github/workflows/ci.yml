name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ----------------------------------------------------------------------------
  # Enforce Conventional Commits on the PR title (powers squash-merge commit msg)
  # ----------------------------------------------------------------------------
  pr-title:
    name: pr-title
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - name: Validate PR title (Conventional Commits)
        env:
          TITLE: ${{ github.event.pull_request.title }}
        run: |
          echo "PR title: $TITLE"
          if ! echo "$TITLE" | grep -Eq '^(feat|fix|docs|style|refactor|perf|test|build|ci|chore|revert)(\([a-z0-9._-]+\))?!?: .+'; then
            echo "::error::PR title must follow Conventional Commits, e.g. 'feat(transport): add QUIC datagram path'"
            exit 1
          fi

  # ----------------------------------------------------------------------------
  # Lint: rustfmt + clippy (deny warnings). No-ops cleanly until Rust code lands.
  # ----------------------------------------------------------------------------
  lint:
    name: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Detect Rust project
        id: rust
        run: |
          if [ -f Cargo.toml ]; then echo "present=true" >> "$GITHUB_OUTPUT"; else echo "present=false" >> "$GITHUB_OUTPUT"; fi
      - name: Add rustfmt + clippy
        if: steps.rust.outputs.present == 'true'
        run: rustup component add rustfmt clippy
      - name: cargo fmt --check
        if: steps.rust.outputs.present == 'true'
        run: cargo fmt --all -- --check
      - name: cargo clippy -D warnings
        if: steps.rust.outputs.present == 'true'
        run: cargo clippy --all-targets --all-features -- -D warnings
      - name: No Rust code yet
        if: steps.rust.outputs.present == 'false'
        run: echo "No Cargo.toml yet — lint gate is a no-op until Rust code lands."

  # ----------------------------------------------------------------------------
  # Test: full suite across Linux, Windows, macOS.
  # ----------------------------------------------------------------------------
  test:
    name: test
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4
      - name: Detect Rust project
        id: rust
        shell: bash
        run: |
          if [ -f Cargo.toml ]; then echo "present=true" >> "$GITHUB_OUTPUT"; else echo "present=false" >> "$GITHUB_OUTPUT"; fi
      - name: Build & test
        if: steps.rust.outputs.present == 'true'
        run: cargo test --workspace --all-features --verbose
      - name: No Rust code yet
        if: steps.rust.outputs.present == 'false'
        shell: bash
        run: echo "No Cargo.toml yet — test gate is a no-op until Rust code lands."

  # ----------------------------------------------------------------------------
  # WASM bridges: build + test (Node runner, no browser required).
  # Guards both sh-wasm (wire-codec parity) and sh-crypto-wasm (browser crypto
  # bridge: identity, R-SIG-AUTH, Noise XK/IK + DTLS binding) from rotting on
  # every PR/push.  Linux-only: wasm-pack + Node suffice for verification without
  # a browser.  Browser-matrix testing (Chrome/FF/Safari) is deferred — see
  # R-BROWSER-INTEROP / R-BROWSER-MATRIX / R-BROWSER-CRYPTO-LIVE (ADR-0019/0020).
  # ----------------------------------------------------------------------------
  wasm:
    name: wasm
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Add wasm32-unknown-unknown target
        run: rustup target add wasm32-unknown-unknown
      - name: Install wasm-pack (pinned, checksum-verified binary)
        uses: taiki-e/install-action@v2
        with:
          tool: wasm-pack@0.13.1

      # --- sh-wasm: wire-codec parity bridge ---
      - name: clippy sh-wasm (wasm target, panic-ban)
        run: cargo clippy --manifest-path crates/sh-wasm/Cargo.toml --target wasm32-unknown-unknown --all-targets -- -D warnings
      - name: wasm-pack test --node sh-wasm (wire-parity suite)
        run: wasm-pack test --node crates/sh-wasm
      - name: wasm-pack build --target web sh-wasm (artifact smoke-check)
        run: wasm-pack build --target web crates/sh-wasm

      # --- sh-crypto-wasm: browser crypto bridge (P5, ADR-0020) ---
      - name: clippy sh-crypto-wasm (wasm target, panic-ban)
        run: cargo clippy --manifest-path crates/sh-crypto-wasm/Cargo.toml --target wasm32-unknown-unknown --all-targets -- -D warnings
      - name: wasm-pack test --node sh-crypto-wasm (identity + R-SIG-AUTH + Noise XK/IK suite)
        run: wasm-pack test --node crates/sh-crypto-wasm
      - name: wasm-pack build --target web sh-crypto-wasm (artifact smoke-check)
        run: wasm-pack build --target web crates/sh-crypto-wasm

  # ----------------------------------------------------------------------------
  # Browser WebRTC client: live RTCPeerConnection e2e in headless Firefox.
  # `sh-web-client` (P5-1c, ADR-0021) enforces the DTLS-fingerprint identity pin
  # (P4-5 / ADR-0014) in the browser.  Node has no RTCPeerConnection, so this job
  # uses headless Firefox + geckodriver.  The non-vacuous MITM-rejection e2e proves
  # a signaling/SDP fingerprint swap is rejected before setRemoteDescription.
  # Chrome/Safari matrix is deferred — R-BROWSER-MATRIX.
  # ----------------------------------------------------------------------------
  browser-webrtc-client:
    name: browser-webrtc-client
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Add wasm32-unknown-unknown target
        run: rustup target add wasm32-unknown-unknown
      - name: Install wasm-pack (pinned, checksum-verified binary)
        uses: taiki-e/install-action@v2
        with:
          tool: wasm-pack@0.13.1
      - name: Install Firefox (headless e2e)
        uses: browser-actions/setup-firefox@v1
        with:
          # Pinned to the exact proven build (ADR-0021: Firefox 152.0.1 + geckodriver 0.37.0).
          # `browser-actions/setup-firefox` needs a full version string (a bare "152" 404s);
          # `latest` could auto-advance into a geckodriver-incompatible Firefox.
          firefox-version: "152.0.1"
      - name: Install geckodriver (pinned GitHub release)
        run: |
          set -euo pipefail
          # Pinned to 0.37.0 to match ADR-0021 (the proven local toolchain: Firefox 152 + geckodriver 0.37).
          GECKO_VERSION=v0.37.0
          GECKO_SHA256=90d4e33bd9816684400c160d1309aaffec23a3f65103511d5a62d8501062e548
          URL="https://github.com/mozilla/geckodriver/releases/download/${GECKO_VERSION}/geckodriver-${GECKO_VERSION}-linux64.tar.gz"
          curl -fsSL "$URL" -o /tmp/geckodriver.tar.gz
          echo "${GECKO_SHA256}  /tmp/geckodriver.tar.gz" | sha256sum -c -
          tar -xzf /tmp/geckodriver.tar.gz -C /usr/local/bin
          chmod +x /usr/local/bin/geckodriver
          geckodriver --version

      - name: clippy sh-web-client (wasm target, panic-ban)
        run: cargo clippy --manifest-path crates/sh-web-client/Cargo.toml --target wasm32-unknown-unknown --all-targets -- -D warnings
      - name: wasm-pack test --headless --firefox sh-web-client (SDP-parser + WebRTC DTLS-pin e2e)
        env:
          # ICE loopback + DTLS convergence can be slower on a loaded CI runner than locally.
          WASM_BINDGEN_TEST_TIMEOUT: "60"
        run: wasm-pack test --headless --firefox crates/sh-web-client
      - name: wasm-pack build --target web sh-web-client (artifact smoke-check)
        run: wasm-pack build --target web crates/sh-web-client

  # ----------------------------------------------------------------------------
  # Browser viewer/control UI (P5-2, ADR-0022): the TS web app over the wasm
  # bridges. Builds the 3 wasm crates (`--target web`), then runs the strict
  # typecheck + Vite build + Vitest pure-logic unit tests + the Playwright
  # headless-Firefox loopback e2e (VIEW decode→canvas + CONTROL input→SHP +
  # H.264 negotiation). Firefox + geckodriver pinned exactly as the
  # `browser-webrtc-client` job. Chrome/Safari matrix deferred — R-BROWSER-MATRIX.
  # ----------------------------------------------------------------------------
  web-ui:
    name: web-ui
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: clients/web
    steps:
      - uses: actions/checkout@v4
      - name: Add wasm32-unknown-unknown target
        run: rustup target add wasm32-unknown-unknown
      - name: Install wasm-pack (pinned, checksum-verified binary)
        uses: taiki-e/install-action@v2
        with:
          tool: wasm-pack@0.13.1
      - name: Setup Node (pinned)
        uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Install Firefox (headless e2e)
        uses: browser-actions/setup-firefox@v1
        with:
          # Pinned to the proven build (ADR-0021/0022: Firefox 152.0.1 + geckodriver 0.37.0).
          firefox-version: "152.0.1"
      - name: Install geckodriver (pinned GitHub release)
        working-directory: .
        run: |
          set -euo pipefail
          GECKO_VERSION=v0.37.0
          GECKO_SHA256=90d4e33bd9816684400c160d1309aaffec23a3f65103511d5a62d8501062e548
          URL="https://github.com/mozilla/geckodriver/releases/download/${GECKO_VERSION}/geckodriver-${GECKO_VERSION}-linux64.tar.gz"
          curl -fsSL "$URL" -o /tmp/geckodriver.tar.gz
          echo "${GECKO_SHA256}  /tmp/geckodriver.tar.gz" | sha256sum -c -
          tar -xzf /tmp/geckodriver.tar.gz -C /usr/local/bin
          chmod +x /usr/local/bin/geckodriver
          geckodriver --version

      - name: npm ci
        run: npm ci
      - name: npm audit (devDeps supply-chain gate, high+)
        run: npm audit --audit-level=high
      - name: Build wasm bridges (--target web) + stage for the app
        run: npm run build:wasm
      - name: Install Playwright Firefox (pinned via @playwright/test)
        run: npx playwright install firefox
      - name: Install ffmpeg (best-effort H.264 decode for Firefox WebCodecs)
        # Playwright's bundled Firefox has no OpenH264 codec on a fresh runner, so WebCodecs
        # cannot decode H.264 to pixels. Installing a H.264-capable libavcodec MAY let Firefox
        # decode (then the e2e's conditional pixel assertion runs in CI too). The e2e does NOT
        # depend on this succeeding — if decode is still unavailable it skips only the pixel
        # assertion and the codec-independent transport/control proofs still gate. ADR-0022.
        run: sudo apt-get update && sudo apt-get install -y ffmpeg
      - name: Build (strict tsc + vite)
        run: npm run build
      - name: Vitest (pure-logic unit tests)
        run: npx vitest run
      - name: Playwright headless-Firefox e2e (VIEW + CONTROL + H.264 loopback)
        env:
          CI: "1"
        run: npx playwright test --project=firefox

  # ----------------------------------------------------------------------------
  # Browser↔Native WebRTC interop e2e (P5-3, ADR-0023).
  #
  # Builds the two native binaries (`streamhaul-signaling`, `streamhaul-webrtc-host`),
  # then drives a headless-Firefox RTCPeerConnection through the full native signaling +
  # DTLS/DataChannel stack. Proves that the SdpBridgeBuilder + PinnedWebRtcTransport
  # pipe works end-to-end with a real browser.
  #
  # Runs only on Linux (the binaries and geckodriver toolchain are Linux-only in CI).
  # Windows/macOS browser↔native interop is deferred — R-BROWSER-MATRIX.
  # ----------------------------------------------------------------------------
  browser-native-e2e:
    name: browser-native-e2e
    needs: [lint, test]
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: clients/web
    steps:
      - uses: actions/checkout@v4
      - name: Build native binaries (streamhaul-signaling + streamhaul-webrtc-host)
        working-directory: .
        run: cargo build --package streamhaul-signaling --package streamhaul-webrtc-host
      - name: Add wasm32-unknown-unknown target
        run: rustup target add wasm32-unknown-unknown
      - name: Install wasm-pack (pinned, checksum-verified binary)
        uses: taiki-e/install-action@v2
        with:
          tool: wasm-pack@0.13.1
      - name: Setup Node (pinned)
        uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Install Firefox (headless e2e)
        uses: browser-actions/setup-firefox@v1
        with:
          # Pinned to the proven build (ADR-0021/0022: Firefox 152.0.1 + geckodriver 0.37.0).
          firefox-version: "152.0.1"
      - name: Install geckodriver (pinned GitHub release)
        working-directory: .
        run: |
          set -euo pipefail
          GECKO_VERSION=v0.37.0
          GECKO_SHA256=90d4e33bd9816684400c160d1309aaffec23a3f65103511d5a62d8501062e548
          URL="https://github.com/mozilla/geckodriver/releases/download/${GECKO_VERSION}/geckodriver-${GECKO_VERSION}-linux64.tar.gz"
          curl -fsSL "$URL" -o /tmp/geckodriver.tar.gz
          echo "${GECKO_SHA256}  /tmp/geckodriver.tar.gz" | sha256sum -c -
          tar -xzf /tmp/geckodriver.tar.gz -C /usr/local/bin
          chmod +x /usr/local/bin/geckodriver
          geckodriver --version
      - name: npm ci
        run: npm ci
      - name: Build wasm bridges (--target web) + stage for the app
        run: npm run build:wasm
      - name: Install Playwright Firefox (pinned via @playwright/test)
        run: npx playwright install firefox
      - name: Build web app (strict tsc + vite)
        run: npm run build
      - name: Playwright browser↔native e2e (P5-3)
        env:
          CI: "1"
          BROWSER_NATIVE_E2E: "1"
          STREAMHAUL_STREAMHAUL_SIGNALING_BIN: "../../target/debug/streamhaul-signaling"
          STREAMHAUL_STREAMHAUL_WEBRTC_HOST_BIN: "../../target/debug/streamhaul-webrtc-host"
        run: npx playwright test --project=firefox e2e/browser-native.spec.ts

  # ----------------------------------------------------------------------------
  # Linux X11 host platform (P6-2, ADR-0025): build + clippy + fmt + Xvfb tests.
  #
  # x11rb uses a pure-Rust RustConnection that speaks the X11 protocol directly over
  # a Unix socket — no libxcb needed. Xvfb provides a real in-memory X server so the
  # capture and XTEST injection integration tests (including the pointer round-trip)
  # run for real in CI and are not skipped.
  # ----------------------------------------------------------------------------
  platform-linux:
    name: platform-linux
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Add rustfmt + clippy
        run: rustup component add rustfmt clippy
      - name: Install Xvfb
        run: sudo apt-get update && sudo apt-get install -y xvfb
      - name: cargo fmt check (sh-platform-linux)
        run: cargo fmt -p sh-platform-linux -- --check
      - name: cargo clippy (sh-platform-linux, deny warnings)
        run: cargo clippy -p sh-platform-linux --all-targets --all-features -- -D warnings
      - name: cargo test under Xvfb (sh-platform-linux)
        run: xvfb-run -a cargo test -p sh-platform-linux

  # ----------------------------------------------------------------------------
  # macOS host platform (P6-1, ADR-0026): compile + clippy + unit tests on a real macOS runner.
  # This is "CI as the compiler": GitHub's macos-latest builds sh-platform-mac against
  # the real CoreGraphics/CoreFoundation SDK, so the framework calls must type-check and link. The
  # OS-independent keymap is unit-tested here too. Live capture/injection is TCC-gated and deferred to
  # real hardware (R-MAC-TCC) — CI cannot grant Screen Recording / Accessibility headlessly.
  # ----------------------------------------------------------------------------
  platform-mac:
    name: platform-mac
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - name: Add rustfmt + clippy
        run: rustup component add rustfmt clippy
      - name: cargo fmt check (sh-platform-mac)
        run: cargo fmt -p sh-platform-mac -- --check
      - name: cargo clippy (sh-platform-mac, deny warnings)
        run: cargo clippy -p sh-platform-mac --all-targets --all-features -- -D warnings
      - name: cargo build (sh-platform-mac, real macOS SDK)
        run: cargo build -p sh-platform-mac
      - name: cargo test (sh-platform-mac — keymap + fail-closed construction)
        run: cargo test -p sh-platform-mac

  # ----------------------------------------------------------------------------
  # Windows host platform (P6-Windows, ADR-0027): compile + clippy + tests on a real Windows runner.
  # "CI as the compiler": windows-latest builds sh-platform-win against the real Win32 SDK (GDI +
  # SendInput via winapi), so the unsafe FFI must type-check and link. Unlike macOS, Windows has no
  # per-app capture/inject permission gate within an interactive session, and the runner has an
  # interactive desktop — so the smoke tests may exercise capture/SendInput end-to-end, not merely
  # compile. Full interactive validation on a real desktop is R-WIN-INTERACTIVE.
  # ----------------------------------------------------------------------------
  platform-win:
    name: platform-win
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - name: Add rustfmt + clippy
        run: rustup component add rustfmt clippy
      - name: cargo fmt check (sh-platform-win)
        run: cargo fmt -p sh-platform-win -- --check
      - name: cargo clippy (sh-platform-win, deny warnings)
        run: cargo clippy -p sh-platform-win --all-targets --all-features -- -D warnings
      - name: cargo build (sh-platform-win, real Win32 SDK)
        run: cargo build -p sh-platform-win
      - name: cargo test (sh-platform-win — keymap + GDI/SendInput smoke)
        run: cargo test -p sh-platform-win

  # ----------------------------------------------------------------------------
  # Software H.264 encoder (OpenH264) — the `sh-codec-openh264` crate is EXCLUDED from the workspace
  # (ADR-0028) so `--workspace --all-features` never builds the vendored OpenH264 C source on every
  # OS / every run. This dedicated job is the only place it is built: it compiles the vendored C
  # (cc + nasm) and runs the encode→decode round-trip test. Licensing posture: see ADR-0028 / ADR-0004
  # (patent-gated, NOT for the default OSS distribution).
  # ----------------------------------------------------------------------------
  codec-openh264:
    name: codec-openh264
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Add rustfmt + clippy
        run: rustup component add rustfmt clippy
      - name: Install cargo-audit (prebuilt)
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-audit
      # Cheapest/pure-Rust checks first (no C toolchain needed) — fail fast before installing nasm
      # and compiling the vendored OpenH264 source.
      - name: cargo audit (excluded crate's own lockfile)
        # The workspace `audit` job only covers the root Cargo.lock; this excluded crate has its
        # own Cargo.lock (openh264/openh264-sys2/nasm-rs/cc), so it needs its own audit gate.
        run: cargo audit --deny warnings --file crates/sh-codec-openh264/Cargo.lock
      - name: cargo fmt check (sh-codec-openh264)
        run: cargo fmt --manifest-path crates/sh-codec-openh264/Cargo.toml -- --check
      - name: Install nasm (OpenH264 SIMD asm)
        run: sudo apt-get update && sudo apt-get install -y nasm
      - name: cargo clippy (sh-codec-openh264, deny warnings)
        run: cargo clippy --manifest-path crates/sh-codec-openh264/Cargo.toml --all-targets -- -D warnings
      - name: cargo test (sh-codec-openh264 — H.264 encode→decode round-trip)
        run: cargo test --manifest-path crates/sh-codec-openh264/Cargo.toml

  # ----------------------------------------------------------------------------
  # Preview host/client (ADR-0030): real-screen OpenH264 video over QUIC. EXCLUDED from the workspace
  # (depends on sh-codec-openh264 / vendored OpenH264 C). The deterministic loopback test uses the
  # synthetic capturer; a separate Xvfb smoke runs the real X11-capture binaries end to end.
  preview:
    name: preview
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Add rustfmt + clippy
        run: rustup component add rustfmt clippy
      - name: Install nasm (OpenH264) + Xvfb (real X11 capture)
        run: sudo apt-get update && sudo apt-get install -y nasm xvfb
      - name: Install cargo-audit (prebuilt)
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-audit
      - name: cargo audit (preview crate's own lockfile)
        run: cargo audit --deny warnings --file bins/streamhaul-preview/Cargo.lock
      - name: cargo fmt check (streamhaul-preview)
        run: cargo fmt --manifest-path bins/streamhaul-preview/Cargo.toml -- --check
      - name: cargo clippy (streamhaul-preview, deny warnings)
        run: cargo clippy --manifest-path bins/streamhaul-preview/Cargo.toml --all-targets -- -D warnings
      - name: cargo test (deterministic synthetic→OpenH264→QUIC loopback)
        run: cargo test --manifest-path bins/streamhaul-preview/Cargo.toml
      - name: Build preview binaries
        run: cargo build --manifest-path bins/streamhaul-preview/Cargo.toml --bins
      - name: Xvfb smoke — real X11 capture → OpenH264 → QUIC → decode
        run: |
          set -euo pipefail
          BIN=bins/streamhaul-preview/target/debug
          # Pin the X screen to depth-24 (the X11 capturer rejects other depths) at an even size.
          xvfb-run -a --server-args "-screen 0 1280x720x24" bash -c '
            set -euo pipefail
            "'"$BIN"'/streamhaul-preview-host" --bind 127.0.0.1:0 --frames 30 --fps 30 --bitrate-kbps 4000 > host.log 2>&1 &
            HOST_PID=$!
            ADDR=""
            for i in $(seq 1 100); do
              ADDR=$(grep -oP "PREVIEW_HOST_ADDR=\K.*" host.log || true)
              [ -n "$ADDR" ] && break
              sleep 0.2
            done
            if [ -z "$ADDR" ]; then echo "host never printed PREVIEW_HOST_ADDR"; cat host.log; exit 1; fi
            echo "host listening at $ADDR"
            # On client failure, still dump the host log (the real diagnostics) before exiting.
            "'"$BIN"'/streamhaul-preview-client" "$ADDR" --frames 30 --recv-timeout 30 --out-dir . \
              || { echo "--- host log (client failed) ---"; cat host.log; exit 1; }
            wait "$HOST_PID" || true
            echo "--- host log ---"; cat host.log
          '

  # ----------------------------------------------------------------------------
  # Live WebRTC preview host (ADR-0032): real-screen X11 + OpenH264 over the WebRTC DataChannel.
  # EXCLUDED from the workspace (depends on sh-codec-openh264 / vendored OpenH264 C). The
  # deterministic test uses SyntheticCapturer (no display); full browser↔live-host e2e is deferred.
  # ----------------------------------------------------------------------------
  webrtc-preview:
    name: webrtc-preview
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Add rustfmt + clippy
        run: rustup component add rustfmt clippy
      - name: Install nasm (OpenH264 SIMD asm)
        run: sudo apt-get update && sudo apt-get install -y nasm
      - name: Rust build cache (OpenH264 vendored C compile is expensive)
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: "bins/streamhaul-webrtc-preview -> target"
      - name: Install cargo-audit (prebuilt)
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-audit
      - name: cargo audit (webrtc-preview crate's own lockfile)
        run: cargo audit --deny warnings --file bins/streamhaul-webrtc-preview/Cargo.lock
      - name: cargo fmt check (streamhaul-webrtc-preview)
        run: cargo fmt --manifest-path bins/streamhaul-webrtc-preview/Cargo.toml -- --check
      - name: cargo clippy (streamhaul-webrtc-preview, deny warnings)
        run: cargo clippy --manifest-path bins/streamhaul-webrtc-preview/Cargo.toml --all-targets -- -D warnings
      - name: cargo test (deterministic SyntheticCapturer→OpenH264→SHP)
        run: cargo test --manifest-path bins/streamhaul-webrtc-preview/Cargo.toml

  # Security audit of dependencies.
  # ----------------------------------------------------------------------------
  audit:
    name: audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Detect Rust project
        id: rust
        run: |
          if [ -f Cargo.toml ]; then echo "present=true" >> "$GITHUB_OUTPUT"; else echo "present=false" >> "$GITHUB_OUTPUT"; fi
      - name: Install cargo-audit (prebuilt)
        if: steps.rust.outputs.present == 'true'
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-audit
      - name: cargo audit
        if: steps.rust.outputs.present == 'true'
        run: cargo audit --deny warnings
      - name: No Rust code yet
        if: steps.rust.outputs.present == 'false'
        run: echo "No Cargo.toml yet — audit gate is a no-op until Rust code lands."

  # ----------------------------------------------------------------------------
  # Fuzz-target compile-check (X-2).
  # The cargo-fuzz crates are EXCLUDED from the workspace (their own workspaces;
  # they need a nightly toolchain + libFuzzer), so a normal `cargo build/clippy`
  # never sees them and a fuzz target that stops compiling rots undetected — a
  # real gap that was previously only caught by hand (P3-3). We decode hostile
  # network bytes, so these parsers MUST stay fuzzable (CLAUDE.md §5). This job
  # type-checks every fuzz target on each PR/push (`cargo fuzz check` — no
  # instrumented build, no fuzzing run; a scheduled nightly *run* is separate).
  # ----------------------------------------------------------------------------
  fuzz-build:
    name: fuzz-build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      # cargo-fuzz requires a nightly toolchain; the repo otherwise pins 1.95.0
      # via rust-toolchain.toml, so install nightly explicitly and invoke it with
      # `cargo +nightly`.
      - name: Install nightly toolchain
        run: rustup toolchain install nightly --profile minimal
      - name: Rust build cache (fuzz workspaces)
        uses: Swatinem/rust-cache@v2
        with:
          # Each fuzz crate is its own workspace with its own target/ dir (matches the
          # excluded-crate cache pattern used by webrtc-preview). New crates can be added here;
          # an un-listed one is simply not cached (still type-checked by the glob below).
          workspaces: |
            crates/sh-protocol/fuzz -> target
            crates/sh-core/fuzz -> target
            crates/sh-transport/fuzz -> target
            crates/sh-codec-hw/fuzz -> target
            crates/sh-crypto/fuzz -> target
            crates/sh-signaling/fuzz -> target
            crates/sh-ice/fuzz -> target
            crates/sh-web-client/fuzz -> target
          key: fuzz-nightly
      - name: Install cargo-fuzz (prebuilt, pinned)
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-fuzz@0.13.2
      - name: cargo fuzz check (every excluded fuzz crate)
        run: |
          set -euo pipefail
          # Pin the sanitizer target to the gnu host triple. cargo-fuzz's *default* target varies
          # by environment (it resolved to x86_64-unknown-linux-musl on the runner — whose static
          # libc is incompatible with -Zsanitizer=address and isn't installed), so we force the
          # gnu target: it ships with the toolchain and its dynamic glibc is ASan-compatible.
          TARGET=x86_64-unknown-linux-gnu
          # Auto-discover every crates/*/fuzz workspace so a newly added fuzz crate cannot be
          # silently omitted (the exact rot this job exists to prevent). `set -e` + the bare
          # `cargo fuzz check` means any target that stops compiling fails the job.
          shopt -s nullglob
          found=0
          for fuzz_dir in crates/*/fuzz; do
            [ -f "${fuzz_dir}/Cargo.toml" ] || continue
            found=$((found + 1))
            c="$(basename "$(dirname "${fuzz_dir}")")"
            echo "::group::cargo fuzz check ${c}"
            cargo +nightly fuzz check --fuzz-dir "${fuzz_dir}" --target "${TARGET}"
            echo "::endgroup::"
          done
          # Guard against a silent no-op (e.g. a path/layout change that matches nothing).
          if [ "${found}" -eq 0 ]; then
            echo "::error::no crates/*/fuzz workspaces found — fuzz compile-check ran nothing" >&2
            exit 1
          fi
          echo "fuzz-checked ${found} crate(s)"
