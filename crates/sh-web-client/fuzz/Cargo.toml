# Fuzz harness for `sh-web-client`'s untrusted-input SDP parser (CLAUDE.md §5: cargo-fuzz is
# mandatory for any parser of hostile network bytes).
#
# Run from `crates/sh-web-client`:
#     cargo +nightly fuzz run parse_sdp_fingerprint
#
# The harness runs NATIVELY (libFuzzer is a native sanitizer runtime).  `sh-web-client` and its
# dependency graph (web-sys / wasm-bindgen / js-sys) compile on the host target — the wasm-only
# entry points are simply never called by the fuzzer, which targets the pure string parser
# `parse_sdp_fingerprint`.
[package]
name = "sh-web-client-fuzz"
version = "0.0.0"
edition = "2021"
publish = false

[package.metadata]
cargo-fuzz = true

# Keep this crate out of the parent's `[workspace]` isolation table.
[workspace]

[dependencies]
libfuzzer-sys = "0.4"

[dependencies.sh-web-client]
path = ".."

[[bin]]
name = "parse_sdp_fingerprint"
path = "fuzz_targets/parse_sdp_fingerprint.rs"
test = false
doc = false
bench = false
